<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SepsiGo — Sepsis Early Detection System</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1E40AF">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SepsiGo">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="description" content="Alat bantu skrining sepsis berbasis Cell Population Data (CPD) Sysmex XN-Series">
<meta name="author" content="SepsiGo Research Team — FK Universitas Airlangga">

<style>
  body { padding-bottom: env(safe-area-inset-bottom); margin: 0; background: #060E24; font-family: sans-serif; }
  
  /* Splash Screen Centering */
  #app-splash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    z-index: 9999;
    background-color: #060E24;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  #app-splash img {
    max-width: 150px;
    margin-bottom: 20px;
  }
  #sp-status-text {
    font-size: 0.9rem;
    color: #94A3B8;
  }
</style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="app-splash">
    <img src="./Logo.png" alt="SepsiGo Logo">
    <div id="sp-status-text">Memuat sistem...</div>
  </div>

  <script>
  (function() {
    var splash = document.getElementById('app-splash');
    if (!splash) return;

    var spMsgs = ['Memuat sistem','Menginisialisasi algoritma','Menyiapkan parameter CPD','Siap digunakan'];
    var spIdx = 0;
    var spEl = document.getElementById('sp-status-text');
    
    var spTicker = setInterval(function() {
      spIdx++;
      if (spIdx >= spMsgs.length) { 
        clearInterval(spTicker);
        setTimeout(() => splash.style.display = 'none', 500);
        return; 
      }
      if (!spEl) return;
      spEl.style.opacity = '0';
      setTimeout(function() {
        if (!spEl) return;
        spEl.innerHTML = spMsgs[spIdx] + (spIdx < spMsgs.length - 1 ? '...' : ' ✓');
        spEl.style.opacity = '1';
      }, 300);
    }, 1000);
  })();
  </script>
</body>
</html>
