<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SepsiGo — Sepsis Early Detection System</title>
  <meta http-equiv="refresh" content="0; url=./SepsiGo.html">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1565C0">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1565C0;
      font-family: sans-serif;
      color: #fff;
    }
    .loading {
      text-align: center;
      opacity: 0.85;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 13px; margin: 0; opacity: .7; }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <strong>SepsiGo</strong>
    <p>Memuat aplikasi…</p>
  </div>
  <script>
    // Redirect segera ke aplikasi utama
    window.location.replace('./SepsiGo.html');
  </script>
</body>
</html>
